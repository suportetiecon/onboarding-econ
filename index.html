<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Integração Tecnológica - Econ Construtora</title>

<style>

/* =====================================
RESET
===================================== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

/* =====================================
VARIÁVEIS
===================================== */

:root{

    --navy:#132f4c;
    --navy2:#1d4d73;
    --cyan:#00a7d7;
    --cyan2:#43d4ff;
    --green:#9BCB2B;

    --light:#f4f7fa;
    --text:#243041;
    --border:#dce5ee;

}

/* =====================================
BASE
===================================== */

html,
body{
    width:100%;
    height:100%;
}

body{

    font-family:'Segoe UI',Arial,sans-serif;

    overflow-x:hidden;
    overflow-y:auto;

    color:var(--text);

    background:
    radial-gradient(circle at top left, rgba(0,167,215,.08), transparent 30%),
    linear-gradient(180deg,#f7fafd,#eef3f8);

}

/* =====================================
PROGRESS
===================================== */

.progress{

    position:fixed;
    top:0;
    left:0;

    width:0%;
    height:6px;

    z-index:9999;

    background:linear-gradient(90deg,var(--cyan),var(--cyan2));

    box-shadow:0 0 18px rgba(0,167,215,.45);

    transition:width .45s ease;

}

/* =====================================
SLIDES
===================================== */

.slide{

    position:absolute;
    inset:0;

    width:100%;
    min-height:100vh;

    overflow-y:auto;

    padding:70px 60px 260px;

    opacity:0;
    visibility:hidden;
    pointer-events:none;

    transform:translateX(40px) scale(.985);

    transition:all .55s ease;

}

.slide.active{

    opacity:1;
    visibility:visible;
    pointer-events:auto;

    transform:translateX(0) scale(1);

    z-index:2;

}

.content{
    max-width:1200px;
    margin:auto;
    position:relative;
    z-index:2;
}

/* =====================================
COVER
===================================== */

.cover{

    background:linear-gradient(135deg,var(--navy),var(--navy2));

    color:white;

    display:flex;
    align-items:center;
    justify-content:center;

    text-align:center;

}

.cover h1{
    font-size:60px;
    margin-bottom:20px;
}

.cover p{
    font-size:24px;
    line-height:1.7;
    max-width:900px;
}

/* =====================================
TITLES
===================================== */

.top{
    display:flex;
    align-items:center;
    margin-bottom:35px;
}

.bar{
    width:10px;
    height:60px;
    border-radius:20px;
    background:var(--cyan);
    margin-right:18px;
}

.title{
    font-size:42px;
    font-weight:800;
    color:var(--navy);
}

/* =====================================
TEXT
===================================== */

.text{
    font-size:22px;
    line-height:1.8;
}

.text p{
    margin-bottom:20px;
}

/* =====================================
HIGHLIGHT / WARNING
===================================== */

.highlight,
.warning{

    margin-top:30px;
    padding:28px;

    border-radius:18px;

    font-size:20px;
    line-height:1.8;

    box-shadow:0 10px 22px rgba(0,0,0,.04);

}

.highlight{
    border-left:6px solid var(--cyan);
    background:#eef8fd;
}

.warning{
    border-left:6px solid #f0a000;
    background:#fff7eb;
}

/* =====================================
CARDS
===================================== */

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:22px;
}

.card{

    background:rgba(255,255,255,.88);
    backdrop-filter:blur(14px);

    border:1px solid var(--border);

    border-radius:22px;

    padding:28px;

    min-height:220px;

    box-shadow:0 10px 22px rgba(0,0,0,.05);

    transition:.25s ease;

    opacity:0;
    transform:translateY(20px);

    animation:cardIn .55s ease forwards;

}

.card:hover{
    transform:translateY(-6px);
}

/* animação resetável */
@keyframes cardIn{
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* =====================================
TIMELINE
===================================== */

.timeline{
    display:flex;
    flex-direction:column;
    gap:22px;
}

.step{
    background:white;
    border-left:8px solid var(--cyan);
    border-radius:18px;
    padding:24px;
    box-shadow:0 8px 18px rgba(0,0,0,.05);
}

/* =====================================
BUTTONS
===================================== */

.nav{
    position:fixed;
    bottom:25px;
    width:100%;
    display:flex;
    justify-content:center;
    gap:12px;
    z-index:999;
}

button{

    padding:14px 26px;

    border:none;
    border-radius:12px;

    cursor:pointer;

    font-size:15px;
    font-weight:600;

    color:white;

    background:var(--navy);

    transition:.25s;

}

button:hover{
    transform:translateY(-2px);
    background:var(--navy2);
}

.start-btn{
    margin-top:35px;
    background:var(--green);
    color:var(--navy);
    font-weight:800;
}

.finish-btn{
    background:var(--cyan);
}

/* =====================================
EVA
===================================== */

.eva-assistant{

    position:fixed;

    right:35px;
    bottom:90px;

    width:520px;

    display:flex;
    align-items:flex-end;

    gap:20px;

    z-index:998;

}

.eva-avatar{
    width:240px;
    flex-shrink:0;
    filter:drop-shadow(0 25px 45px rgba(0,0,0,.22));
    animation:float 4s ease-in-out infinite;
}

.eva-avatar img{
    width:100%;
    display:block;
}

.eva-message{

    background:rgba(255,255,255,.85);
    backdrop-filter:blur(14px);

    padding:22px 24px;

    border-radius:24px;

    font-size:17px;
    line-height:1.8;

    box-shadow:0 14px 30px rgba(0,0,0,.12);

}

/* float */
@keyframes float{
    0%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
    100%{transform:translateY(0);}
}

/* =====================================
RESPONSIVO
===================================== */

@media(max-width:1200px){

    .eva-assistant{
        width:340px;
        right:15px;
        bottom:80px;
        gap:12px;
    }

    .eva-avatar{width:140px;}

    .eva-message{
        font-size:14px;
        padding:16px;
    }
}

@media(max-width:1024px){

    .slide{
        padding:40px 24px 260px;
    }

    .eva-assistant{

        left:20px;
        right:20px;

        bottom:70px;

        width:auto;

        background:rgba(255,255,255,.9);
        backdrop-filter:blur(12px);

        padding:14px;
        border-radius:22px;

    }

    .eva-message{
        background:transparent;
        box-shadow:none;
        padding:0;
    }

    .eva-avatar{
        width:110px;
    }

}

</style>
</head>

<body>

<div class="progress" id="progress"></div>

<div class="eva-assistant">

    <div class="eva-avatar">
        <img id="evaImage" src="eva-apresentando.png">
    </div>

    <div class="eva-message" id="evaMessage">
        Olá 👋
    </div>

</div>

<!-- (SLIDES MANTIDOS IGUAIS AO SEU — OMITIDO AQUI POR ESPAÇO) -->

<script>

let current = 0;

function showSlide(index){

    const slides = document.querySelectorAll(".slide");

    slides.forEach(s=>s.classList.remove("active"));

    slides[index].classList.add("active");

    updateProgress(index);
    updateEva();

    // 🔥 RESETA ANIMAÇÃO DOS CARDS
    slides[index].querySelectorAll(".card").forEach(card=>{
        card.style.animation="none";
        void card.offsetWidth;
        card.style.animation="";
    });

}

function updateEva(){

    const eva = evaContent[current];

    document.getElementById("evaImage").src = eva.image;

    document.getElementById("evaMessage").innerHTML =
    eva.text.replace(/\n/g,"<br>");

}

</script>

</body>
</html>
