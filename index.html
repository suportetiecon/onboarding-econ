<script>

let current = 0;

/* =====================================
NOME DINÂMICO (ROBUSTO)
===================================== */

function getNome(){

    const params = new URLSearchParams(window.location.search);

    const nomeRaw = params.get("nome");

    if(!nomeRaw) return "Colaborador";

    return decodeURIComponent(nomeRaw);

}

const nomeUsuario = getNome();

/* Atualiza título principal */
document.getElementById("welcome").innerText =
`Bem-vindo, ${nomeUsuario}`;

/* =====================================
EVA CONTENT (DINÂMICO)
===================================== */

const evaContent = {

    0:{
        image:"eva-apresentando.png",
        text:
        `Olá ${nomeUsuario} 👋\n\nEu sou a EVA e vou ajudar você durante toda a integração tecnológica da Econ Construtora.`
    },

    1:{
        image:"eva-apontando.png",
        text:
        "Aqui você conhecerá os principais recursos tecnológicos, acessos e boas práticas da empresa."
    },

    2:{
        image:"eva-computador.png",
        text:
        "Sua primeira ação será alterar a senha corporativa e validar seus acessos."
    },

    3:{
        image:"eva-negando.png",
        text:
        "Nunca compartilhe senhas ou códigos MFA. Seus acessos são pessoais e intransferíveis."
    },

    4:{
        image:"eva-computador.png",
        text:
        "Teams, Outlook e sistemas internos fazem parte da rotina corporativa diária."
    },

    5:{
        image:"eva-negando.png",
        text:
        "Se algo parecer suspeito, não clique. Em caso de dúvida, fale com a TI."
    },

    6:{
        image:"eva-apontando.png",
        text:
        "Os equipamentos corporativos devem ser utilizados exclusivamente para atividades profissionais."
    },

    7:{
        image:"eva-apresentando.png",
        text:
        "Esse é o time responsável por apoiar você nas demandas de tecnologia."
    },

    8:{
        image:"eva-computador.png",
        text:
        "Ao abrir chamados, tente descrever o problema com o máximo de detalhes possível."
    },

    9:{
        image:"eva-negando.png",
        text:
        "A segurança da informação depende da colaboração de todos os colaboradores."
    },

    10:{
        image:"eva-final.png",
        text:
        `Parabéns ${nomeUsuario} 🎉\n\nSua integração tecnológica foi concluída com sucesso!`
    }

};

/* =====================================
SLIDES
===================================== */

function getSlides(){
    return document.querySelectorAll(".slide");
}

function showSlide(index){

    const slides = getSlides();

    slides.forEach(slide=>{
        slide.classList.remove("active");
    });

    slides[index].classList.add("active");

    updateProgress(index);
    updateButtons();
    updateCounter();
    updateEva();

    slides[index].scrollTo({
        top:0,
        behavior:"smooth"
    });

}

/* =====================================
NAVEGAÇÃO
===================================== */

function nextSlide(){

    const slides = getSlides();

    if(current < slides.length -1){
        current++;
        showSlide(current);
    }

}

function prevSlide(){

    if(current > 0){
        current--;
        showSlide(current);
    }

}

/* =====================================
PROGRESSO
===================================== */

function updateProgress(index){

    const slides = getSlides();

    const percent =
    (index / (slides.length -1)) * 100;

    document.getElementById("progress").style.width =
    percent + "%";

}

/* =====================================
BOTÕES
===================================== */

function updateButtons(){

    const slides = getSlides();

    document.getElementById("prevBtn").style.display =
    current === 0 ? "none" : "inline-block";

    document.getElementById("nextBtn").style.display =
    current === slides.length -1 ? "none" : "inline-block";

    document.querySelector(".nav").style.display =
    current === 0 ? "none" : "flex";

}

/* =====================================
COUNTER
===================================== */

function updateCounter(){

    const slides = getSlides();

    document.getElementById("counter").innerText =
    `Slide ${current + 1} de ${slides.length}`;

}

/* =====================================
EVA
===================================== */

function updateEva(){

    const eva = evaContent[current];

    document.getElementById("evaImage").src =
    eva.image;

    document.getElementById("evaMessage").innerHTML =
    eva.text.replace(/\n/g,"<br>");

}

/* =====================================
FINALIZAR
===================================== */

function finalizar(){

    alert(
        `✅ ${nomeUsuario}, sua integração foi concluída com sucesso!`
    );

}

/* =====================================
EVENTOS
===================================== */

document.getElementById("startBtn")
.addEventListener("click", nextSlide);

document.getElementById("nextBtn")
.addEventListener("click", nextSlide);

document.getElementById("prevBtn")
.addEventListener("click", prevSlide);

/* =====================================
TECLADO
===================================== */

document.addEventListener("keydown",(e)=>{

    if(e.key === "ArrowRight") nextSlide();
    if(e.key === "ArrowLeft") prevSlide();

});

/* =====================================
START
===================================== */

showSlide(0);

</script>
