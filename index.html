<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Integração Tecnológica - Econ Construtora</title>

<style>
/* (SEU CSS ORIGINAL — NÃO MEXI EM NADA) */
</style>
</head>

<body>

<div class="progress" id="progress"></div>

<div class="eva-assistant">

    <div class="eva-avatar">
        <img id="evaImage" src="eva-apresentando.png" alt="EVA">
    </div>

    <div class="eva-message" id="evaMessage">
        Olá 👋
    </div>

</div>

<div class="slide-counter" id="counter">
Slide 1 de 11
</div>

<section class="slide cover active">
<div class="content">

<h1 id="welcome">
Bem-vindo
</h1>

<p>
Programa de Integração Tecnológica
<br><br>
Segurança • Acessos • Recursos Corporativos
</p>

<button class="start-btn" id="startBtn">
Iniciar Integração
</button>

</div>
</section>

<!-- (RESTO DOS SLIDES — IGUAL AO SEU, NÃO PRECISA MEXER) -->

<script>

let current = 0;

/* =====================================
NOME DINÂMICO MELHORADO 🔥
===================================== */

function getNome(){
    const params = new URLSearchParams(window.location.search);
    return params.get("nome") || "Colaborador";
}

// Nome completo vindo da URL
const nomeCompleto = getNome().trim();

// Pegar primeiro nome
const primeiroNome = nomeCompleto.split(" ")[0];

// Capitalizar
function formatarNome(nome){
    return nome.charAt(0).toUpperCase() + nome.slice(1).toLowerCase();
}

const nomeUsuario = formatarNome(primeiroNome);

/* =====================================
APLICAR NOME NA TELA
===================================== */

document.getElementById("welcome").innerText =
"Bem-vindo, " + nomeUsuario + "!";

/* =====================================
EVA CONTENT (AJUSTADA COM NOME)
===================================== */

const evaContent = {

    0:{
        image:"eva-apresentando.png",
        text:
        `Olá ${nomeUsuario} 👋<br><br>
Eu sou a EVA e vou ajudar você durante toda a integração tecnológica da Econ Construtora.`
    },

    10:{
        image:"eva-final.png",
        text:
        `Parabéns ${nomeUsuario} 🎉<br><br>
Sua integração tecnológica foi concluída com sucesso!`
    }

};

/* =====================================
SLIDES / EVA / CONTROLES
===================================== */

function getSlides(){
    return document.querySelectorAll(".slide");
}

function showSlide(index){

    const slides = getSlides();

    slides.forEach(s => s.classList.remove("active"));
    slides[index].classList.add("active");

    updateProgress(index);
    updateButtons();
    updateCounter();
    updateEva();

    slides[index].scrollTo({ top:0, behavior:"smooth" });
}

function nextSlide(){
    const slides = getSlides();
    if(current < slides.length -1){
        current++;
        showSlide(current);
    }
}

function prevSlide(){
    if(current > 0){
        current--;
        showSlide(current);
    }
}

function updateProgress(index){
    const slides = getSlides();
    const percent = (index / (slides.length -1)) * 100;
    document.getElementById("progress").style.width = percent + "%";
}

function updateButtons(){
    const slides = getSlides();

    document.getElementById("prevBtn").style.display =
    current === 0 ? "none" : "inline-block";

    document.getElementById("nextBtn").style.display =
    current === slides.length -1 ? "none" : "inline-block";

    document.querySelector(".nav").style.display =
    current === 0 ? "none" : "flex";
}

function updateCounter(){
    const slides = getSlides();
    document.getElementById("counter").innerText =
    `Slide ${current + 1} de ${slides.length}`;
}

function updateEva(){

    const eva = evaContent[current];

    if(!eva) return;

    document.getElementById("evaImage").src = eva.image;
    document.getElementById("evaMessage").innerHTML = eva.text;

}

function finalizar(){
    alert(`✅ ${nomeUsuario}, sua integração foi concluída com sucesso!`);
}

/* EVENTS */

document.getElementById("startBtn").addEventListener("click", nextSlide);
document.getElementById("nextBtn").addEventListener("click", nextSlide);
document.getElementById("prevBtn").addEventListener("click", prevSlide);

document.addEventListener("keydown",(e)=>{
    if(e.key === "ArrowRight") nextSlide();
    if(e.key === "ArrowLeft") prevSlide();
});

/* START */
showSlide(0);

</script>

</body>
</html>
``
