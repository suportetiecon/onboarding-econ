<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Integração Tecnológica - Econ Construtora</title>

<style>
/* (seu CSS ficou perfeito, mantive igual) */
*{margin:0;padding:0;box-sizing:border-box;}

:root{
    --navy:#132f4c;
    --navy2:#1d4d73;
    --cyan:#00a7d7;
    --green:#9BCB2B;
    --light:#f4f7fa;
    --text:#243041;
    --border:#dce5ee;
}

body{
    font-family:'Segoe UI',Arial,sans-serif;
    background:var(--light);
    overflow-x:hidden;
    overflow-y:auto;
    color:var(--text);
}

/* EVA */
.eva{
    position:fixed;
    right:30px;
    bottom:90px;
    width:210px;
}

.eva-msg{
    position:fixed;
    right:240px;
    bottom:170px;
    max-width:320px;
    background:white;
    padding:18px 20px;
    border-radius:18px;
}

/* SLIDES */
.slide{position:absolute;width:100%;min-height:100vh;opacity:0;}
.slide.active{opacity:1;}

.nav{position:fixed;bottom:25px;width:100%;text-align:center;}

button{padding:12px 20px;}
</style>
</head>

<body>

<div id="progress"></div>

<!-- EVA -->
<img id="eva" class="eva" src="eva-apresentando.jpg">

<div class="eva-msg" id="evaMsg">
Olá! Eu sou a Eva 👋
</div>

<!-- SLIDE -->
<section class="slide active">
<div class="content">
<h1 id="welcome">Bem-vindo</h1>

<button onclick="nextSlide()">
Iniciar Integração
</button>
</div>
</section>

<!-- NAV -->
<div class="nav">
<button id="prevBtn" onclick="prevSlide()">◀ Voltar</button>
<button onclick="nextSlide()">Próximo ▶</button>
</div>

<script>

let current = 0;

const evaImages = [
"eva-apresentando.jpg",
"eva-apontando.jpg",
"eva-computador.jpg",
"eva-final.jpg"
];

const evaMessages = [
"Olá! Eu sou a Eva 👋 Bem-vindo(a)",
"Vamos começar 🔐",
"Fique atento à segurança",
"Parabéns 🎉"
];

function getSlides(){
    return document.querySelectorAll(".slide");
}

function showSlide(index){
    const slides = getSlides();

    slides.forEach(s => s.classList.remove("active"));
    slides[index].classList.add("active");

    updateEva();
}

function nextSlide(){
    const slides = getSlides();
    if(current < slides.length -1){
        current++;
        showSlide(current);
    }
}

function prevSlide(){
    if(current > 0){
        current--;
        showSlide(current);
    }
}

function updateEva(){
    const eva = document.getElementById("eva");
    const msg = document.getElementById("evaMsg");

    eva.src = evaImages[current] || evaImages[0];
    msg.innerText = evaMessages[current] || "";
}

function getNome(){
    const params = new URLSearchParams(window.location.search);
    return params.get("nome") || "Colaborador";
}

document.getElementById("welcome").innerText =
"Bem-vindo, " + getNome();

updateEva();

</script>

</body>
</html>
